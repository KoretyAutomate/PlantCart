# Fly.io config for PlantCart SaaS.
# NOTE: `app` must be globally unique on Fly — deploy-fly.sh sets it for you, or
# edit it here. Secrets (PLANTCART_SECRET, ANTHROPIC_API_KEY) go via `fly secrets set`.
app = "plantcart-CHANGEME"
primary_region = "nrt"   # Tokyo — closest to the user

[build]
  dockerfile = "Dockerfile"

[env]
  PLANTCART_ENV = "production"
  PLANTCART_PORT = "8123"
  PLANTCART_DB = "/data/plantcart.db"
  # Start with LLM off → the only required secret is PLANTCART_SECRET, and the
  # list + sync + recommendations all work. Flip to "anthropic" + set
  # ANTHROPIC_API_KEY later to enable recipes/plant enrichment — but only
  # AFTER PLANTCART_REGISTRATION=closed (open signup + billable LLM = cost hole).
  PLANTCART_LLM_PROVIDER = "none"
  PLANTCART_LLM_MODEL = "claude-haiku-4-5-20251001"
  # Fly ONLY: fly-proxy sets Fly-Client-IP authoritatively, so the auth rate
  # limiter can key on real client IPs. NEVER set this behind any other proxy
  # (Render/Caddy/nginx pass a client-forged header straight through).
  PLANTCART_TRUST_FLY_CLIENT_IP = "1"

# Persistent SQLite lives here. deploy-fly.sh creates the volume for you.
[mounts]
  source = "plantcart_data"
  destination = "/data"
  initial_size = "1gb"

[http_service]
  internal_port = 8123
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  # One always-on machine (~$3-5/mo): auto-stop would cold-start on nearly
  # every phone unlock in-store — 1-2s of lag dozens of times per trip.
  min_machines_running = 1

  # SQLite has a single writer — do not scale past one machine (see DEPLOY.md).
  [http_service.concurrency]
    type = "requests"
    hard_limit = 200
    soft_limit = 150

  [[http_service.checks]]
    method = "GET"
    path = "/health"
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
